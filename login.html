<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="favicon.svg" sizes="any" type="image/svg+xml">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PawTrain Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: var(--bg-alt); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
        .auth-card { position: relative; background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 500px; padding: 2.5rem; border: 1px solid var(--border-color); }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-color); color: var(--text-main); }
        .form-control:focus { outline: none; border-color: var(--primary-color); }
        
        .divider { display: flex; align-items: center; text-align: center; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider:not(:empty)::before { margin-right: 1rem; }
        .divider:not(:empty)::after { margin-left: 1rem; }
        
        .social-auth { display: flex; flex-direction: column; gap: 0.75rem; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); color: var(--text-main); font-weight: 500; font-size: 0.875rem; transition: var(--transition); background: transparent; }
        .social-btn:hover { background: var(--bg-alt); border-color: var(--primary-color); }
        
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 0.25rem; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; transition: var(--transition); }
        .password-toggle:hover { color: var(--primary-color); }

        .auth-controls { position: absolute; top: 1.5rem; right: 1.5rem; display: flex; gap: 0.5rem; z-index: 100; }
        [dir="rtl"] .auth-controls { right: auto; left: 1.5rem; }
        
        @media (max-width: 600px) {
            .auth-controls { top: 1rem; right: 1rem; }
            [dir="rtl"] .auth-controls { right: auto; left: 1rem; }
        }
    </style>
</head>
<body>
    <div class="auth-controls">
        <button class="direction-toggle" title="Toggle RTL/LTR" style="background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0.5rem; display: flex; transition: var(--transition); border-radius: 50%;"><i data-lucide="arrow-right-left" style="width: 20px; height: 20px;"></i></button>
        <button class="theme-toggle" title="Toggle Theme" style="background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0.5rem; display: flex; transition: var(--transition); border-radius: 50%;"><i data-lucide="moon" style="width: 20px; height: 20px;"></i></button>
    </div>
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="brand" style="justify-content: center; margin-bottom: 1rem;">
                <i data-lucide="shield-check" style="width: 32px; height: 32px;"></i> PawTrain
            </a>
            <h2 style="font-size: 1.5rem;">Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 0.875rem;">Log in to view your dog's progress</p>
        </div>
        <form action="owner-dashboard.html">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" placeholder="••••••••" required>
                    <button type="button" class="password-toggle">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
                <div style="text-align: right; margin-top: 0.5rem;">
                    <a href="#" style="font-size: 0.75rem; color: var(--primary-color);">Forgot password?</a>
                </div>
            </div>
            <div class="form-group" style="display: flex; gap: 0.75rem; align-items: flex-start; margin-top: 1.5rem;">
                <input type="checkbox" id="terms" required style="width: 18px; height: 18px; margin-top: 2px; accent-color: var(--primary-color); cursor: pointer;">
                <label for="terms" style="font-size: 0.875rem; color: var(--text-muted); cursor: pointer;">
                    I agree to the <a href="#" style="color: var(--primary-color); font-weight: 500;">Terms of Service</a> and <a href="#" style="color: var(--primary-color); font-weight: 500;">Privacy Policy</a>.
                </label>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>
        <div class="divider">Or continue with</div>
        <div class="social-auth">
            <button class="social-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>
                Google
            </button>
            <button class="social-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Facebook
            </button>
            <button class="social-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.75.9-.03 2.04-.83 3.44-.75 2.14.12 3.32 1.32 3.96 2.58-4.4 2.15-3.66 8.3.47 10.39zm-4-15c-.06 2.04-1.79 3.67-3.51 3.51.05-1.92 1.94-3.7 3.51-3.51z"/></svg>
                Apple
            </button>
        </div>
        <div style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--text-muted);">
            Don't have an account? <a href="signup.html" style="color: var(--primary-color); font-weight: 500;">Sign up</a>
        </div>
    </div>
    <!-- Scroll to Top -->
    <button id="scrollToTop" class="scroll-top" aria-label="Scroll to top">
        <i data-lucide="chevron-up"></i>
    </button>
    <script src="assets/js/script.js"></script>
</body>
</html>
