<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | K9 Mastery Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: var(--bg-alt); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
        .auth-card { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 400px; padding: 2.5rem; border: 1px solid var(--border-color); }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-color); color: var(--text-main); }
        .form-control:focus { outline: none; border-color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="brand" style="justify-content: center; margin-bottom: 1rem;">
                <i data-lucide="shield-check" style="width: 32px; height: 32px;"></i>
            </a>
            <h2>Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 0.875rem;">Log in to view your dog's progress</p>
        </div>

        <form action="owner-dashboard.html">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label class="form-label" style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 0.75rem; color: var(--primary-color);">Forgot?</a>
                </div>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--text-muted);">
            Don't have an account? <a href="contact.html" style="color: var(--primary-color); font-weight: 500;">Contact us</a>
        </div>
        
        <div style="text-align: center; margin-top: 1rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
            <a href="trainer-dashboard.html" style="font-size: 0.75rem; color: var(--text-muted);">Trainer Login</a>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
