<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="favicon.svg" sizes="any" type="image/svg+xml">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Mass Update | PawTrain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: var(--bg-alt); padding-top: 0; }
        .dashboard-layout { display: flex; min-height: 100vh; }
        .sidebar { background: var(--bg-color); width: 280px; border-right: 1px solid var(--border-color); padding: 1.5rem; display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; z-index: 1001; transition: transform 0.3s ease; }
        .main-content { flex: 1; margin-left: 280px; padding: 2rem; max-width: 1200px; transition: margin 0.3s ease; }
        [dir="rtl"] .sidebar { border-right: none; border-left: 1px solid var(--border-color); }
        [dir="rtl"] .main-content { margin-left: 0; margin-right: 280px; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: var(--radius-md); color: var(--text-muted); font-weight: 500; transition: var(--transition); margin-bottom: 0.25rem; }
        .nav-item:hover, .nav-item.active { background: var(--bg-alt); color: var(--primary-color); }

        .mobile-header { display: none; background: var(--bg-color); padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; align-items: center; justify-content: space-between; width: 100%; }
        .menu-toggle { background: none; border: none; color: var(--text-main); font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; opacity: 0; transition: opacity 0.3s ease; }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); width: 260px; }
            .sidebar.active { transform: translateX(0); }
            [dir="rtl"] .sidebar { transform: translateX(100%); }
            [dir="rtl"] .sidebar.active { transform: translateX(0); }
            
            .main-content { margin-left: 0; padding: 1.5rem; }
            [dir="rtl"] .main-content { margin-right: 0; }
            .mobile-header { display: flex; }
            .sidebar-overlay.active { display: block; opacity: 1; }
        }

        @media (max-width: 640px) {
            .main-content { padding: 1rem; }
            h1 { font-size: 1.75rem; }
            .btn { width: 100%; justify-content: center; }
            .flex-buttons { flex-direction: column; gap: 1rem; }
        }
        
        .dashboard-controls { position: absolute; top: 1.5rem; right: 2rem; display: flex; gap: 0.5rem; z-index: 100; }
        [dir="rtl"] .dashboard-controls { right: auto; left: 2rem; }
        @media (max-width: 992px) { .dashboard-controls { display: none; } }
    </style>
</head>
<body>
    <!-- Mobile Header -->
    <header class="mobile-header">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Menu">
            <i data-lucide="menu"></i>
        </button>
        <a href="index.html" class="brand" style="margin-bottom: 0;"><i data-lucide="shield-check"></i> PawTrain</a>
        <div style="width: 24px;"></div> <!-- Spacer -->
    </header>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="index.html" class="brand" style="margin-bottom: 2.5rem; padding-left: 0.5rem;"><i data-lucide="shield-check"></i> PawTrain</a>
            <div style="margin-bottom: 2rem; padding: 1rem; text-align: center;">
                <img src="https://images.unsplash.com/photo-1566492031773-4f4e44671857?q=80&w=128&auto=format&fit=crop" style="width: 64px; height: 64px; border-radius: 50%; object-fit: cover; margin: 0 auto 1rem; display: block;" alt="Trainer Marcus">
                <h4 style="margin-bottom: 0;">Trainer Marcus</h4>
                <span style="color: var(--text-muted); font-size: 0.875rem;">Head Trainer</span>
            </div>
            <nav style="flex-grow: 1;">
                <a href="trainer-dashboard.html" class="nav-item"><i data-lucide="users"></i> My Pack (4)</a>
                <a href="mass-update.html" class="nav-item active"><i data-lucide="plus-square"></i> New Mass Update</a>
                <a href="schedule.html" class="nav-item"><i data-lucide="calendar"></i> Schedule</a>
                <a href="messages.html" class="nav-item"><i data-lucide="message-square"></i> Client Messages <span style="background: #ef4444; color: white; padding: 2px 6px; border-radius: 10px; font-size: 0.75rem; margin-left: auto;">3</span></a>
            </nav>
            <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <a href="login.html" class="nav-item" title="Sign Out" style="margin-bottom: 0;"><i data-lucide="log-out"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" style="position: relative;">
            <div class="dashboard-controls">
                <button class="direction-toggle nav-item" style="background: none; border: none; cursor: pointer; padding: 0.5rem;" title="Toggle Direction">RTL</button>
                <button class="theme-toggle nav-item" style="background: none; border: none; cursor: pointer; padding: 0.5rem;" title="Toggle Theme"><i data-lucide="moon"></i></button>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1 style="margin-bottom: 0.5rem;">Welcome back, Trainer Marcus!</h1>
                    <p style="color: var(--text-muted); font-size: 1.125rem;">Send announcements or media to multiple clients at once.</p>
                </div>
            </div>
            
            <div class="card">
                <form>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Select Recipients</label>
                        <select multiple style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); outline: none; height: 120px;">
                            <option value="all">All Active Clients</option>
                            <option value="rocky">Rocky (Sarah T.)</option>
                            <option value="luna">Luna (Mike R.)</option>
                            <option value="bear">Bear (Emily D.)</option>
                        </select>
                        <span style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 0.5rem;">Hold Ctrl/Cmd to select multiple.</span>
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Subject (Optional)</label>
                        <input type="text" placeholder="e.g. Schedule Change, Group Class Reminder" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); outline: none; background: transparent; color: var(--text-main);">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Message</label>
                        <textarea rows="6" placeholder="Write your update here..." style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); outline: none; background: transparent; color: var(--text-main); font-family: inherit; resize: vertical;"></textarea>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Attachments</label>
                        <div style="border: 2px dashed var(--border-color); padding: 2.5rem; border-radius: var(--radius-md); text-align: center; color: var(--text-muted); cursor: pointer; transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='var(--bg-alt)'" onmouseout="this.style.backgroundColor='transparent'">
                            <i data-lucide="upload-cloud" style="width: 48px; height: 48px; margin-bottom: 1rem; color: var(--primary-color);"></i>
                            <p style="margin: 0;">Drag and drop media here or click to browse</p>
                        </div>
                    </div>
                    <div class="flex-buttons" style="display: flex; gap: 1rem;">
                        <button type="button" class="btn btn-primary" style="flex: 1; justify-content: center;"><i data-lucide="send"></i> Send Mass Update</button>
                        <button type="button" class="btn btn-secondary" style="flex: 1; justify-content: center;">Save as Draft</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Scroll to Top -->
    <button id="scrollToTop" class="scroll-top" aria-label="Scroll to top">
        <i data-lucide="chevron-up"></i>
    </button>
    
    <script src="assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            function toggleSidebar() {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
                const isOpened = sidebar.classList.contains('active');
                menuToggle.querySelector('i').setAttribute('data-lucide', isOpened ? 'x' : 'menu');
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }

            if (menuToggle && sidebar && overlay) {
                menuToggle.addEventListener('click', toggleSidebar);
                overlay.addEventListener('click', toggleSidebar);
            }

            // Close sidebar on window resize if it's open and moving to desktop
            window.addEventListener('resize', () => {
                if (window.innerWidth > 992 && sidebar.classList.contains('active')) {
                    toggleSidebar();
                }
            });
        });
    </script>
</body>
</html>
