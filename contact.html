<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | K9 Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-color); color: var(--text-main); }
        .form-control:focus { outline: none; border-color: var(--primary-color); }
    </style>
</head>
<body>
    <nav class="navbar">... <!-- nav --></nav>

    <!-- 1️⃣ Contact Header -->
    <section class="section" style="padding-top: 6rem; padding-bottom: 2rem;">
        <div class="container text-center">
            <h1>Get in Touch</h1>
            <p style="font-size: 1.25rem; max-width: 800px; margin: 0 auto;">Ready to transform your dog? Contact us to schedule your free evaluation or ask any questions.</p>
        </div>
    </section>

    <!-- 2️⃣ Form & Info split -->
    <section class="section">
        <div class="container grid-2" style="align-items: start;">
            <!-- 3️⃣ Contact Form -->
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Send a Message</h3>
                <form>
                    <div class="form-group">
                        <label class="form-label">Your Name</label>
                        <input type="text" class="form-control" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Dog Breed & Age</label>
                        <input type="text" class="form-control" placeholder="e.g., German Shepherd, 2 years">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Main Behavioral Issues</label>
                        <textarea class="form-control" rows="4" placeholder="Tell us what you're struggling with..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Request Evaluation</button>
                </form>
            </div>

            <!-- Contact Information (Combining Section 2 & 4 into the right column conceptually, but explicitly keeping 4 sections structure, so I'll separate the map) -->
            <div>
                <h3 style="margin-bottom: 1.5rem;">Contact Information</h3>
                <div class="card" style="margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center;">
                    <i data-lucide="phone" style="color: var(--primary-color);"></i>
                    <div>
                        <strong style="display: block;">Call Us</strong>
                        <span style="color: var(--text-muted);">(555) 123-4567</span>
                    </div>
                </div>
                <div class="card" style="margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center;">
                    <i data-lucide="mail" style="color: var(--primary-color);"></i>
                    <div>
                        <strong style="display: block;">Email Us</strong>
                        <span style="color: var(--text-muted);">hello@k9mastery.com</span>
                    </div>
                </div>
                <div class="card" style="display: flex; gap: 1rem; align-items: center;">
                    <i data-lucide="map-pin" style="color: var(--primary-color);"></i>
                    <div>
                        <strong style="display: block;">Location</strong>
                        <span style="color: var(--text-muted);">123 Training Way, Awesome City, ST 12345</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 4️⃣ Map/Location -->
    <section class="section section-alt">
        <div class="container">
            <div style="background: var(--border-color); height: 400px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; color: var(--text-muted);">
                <div style="text-align: center;">
                    <i data-lucide="map" style="width: 48px; height: 48px; margin-bottom: 1rem;"></i>
                    <h3>Google Maps Integration Area</h3>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">...</footer>
    <script src="assets/js/script.js"></script>
</body>
</html>
