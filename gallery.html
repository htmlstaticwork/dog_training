<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | K9 Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        .gallery-grid img {
            border-radius: var(--radius-md);
            height: 250px;
            width: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        .gallery-grid img:hover {
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <nav class="navbar">... <!-- nav --></nav>

    <!-- 1️⃣ Gallery Intro -->
    <section class="section" style="padding-top: 6rem;">
        <div class="container text-center">
            <h1>Our Gallery</h1>
            <p style="font-size: 1.25rem; max-width: 800px; margin: 0 auto;">A look inside our facility, our training methods, and the happy dogs that graduate our program.</p>
        </div>
    </section>

    <!-- 2️⃣ Facility Photos -->
    <section class="section section-alt">
        <div class="container">
            <h2 style="margin-bottom: 2rem;">The Facility</h2>
            <div class="gallery-grid">
                <img src="https://images.unsplash.com/photo-1541364983171-a8ba01e9d7ce?q=80&w=800&auto=format&fit=crop" alt="Facility 1">
                <img src="https://images.unsplash.com/photo-1587300003388-59208cb962cb?q=80&w=800&auto=format&fit=crop" alt="Facility 2">
                <img src="https://images.unsplash.com/photo-1592398572111-d0076a596fac?q=80&w=800&auto=format&fit=crop" alt="Facility 3">
                <img src="https://images.unsplash.com/photo-1583337130417-3346a1be7dee?q=80&w=800&auto=format&fit=crop" alt="Facility 4">
            </div>
        </div>
    </section>

    <!-- 3️⃣ Training Photos -->
    <section class="section">
        <div class="container">
            <h2 style="margin-bottom: 2rem;">Dogs in Action</h2>
            <div class="gallery-grid">
                <img src="https://images.unsplash.com/photo-1544568100-847a948585b9?q=80&w=800&auto=format&fit=crop" alt="Training 1">
                <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=800&auto=format&fit=crop" alt="Training 2">
                <img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?q=80&w=800&auto=format&fit=crop" alt="Training 3">
                <img src="https://images.unsplash.com/photo-1597626133663-53df9633b799?q=80&w=800&auto=format&fit=crop" alt="Training 4">
            </div>
        </div>
    </section>

    <!-- 4️⃣ CTA -->
    <section class="section section-alt text-center">
        <div class="container">
            <h2>Picture Your Dog Here</h2>
            <p style="margin-bottom: 2rem;">Ready to join our pack?</p>
            <a href="contact.html" class="btn btn-primary">Book Consultation</a>
        </div>
    </section>

    <footer class="footer">...</footer>
    <script src="assets/js/script.js"></script>
</body>
</html>
